name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install shellcheck and bats
        run: sudo apt-get update && sudo apt-get install -y shellcheck bats

      - name: Lint + unit tests (bash -n, shellcheck, bats)
        run: bash tests/run.sh

      - name: Dry-run smoke across all distro families
        run: |
          set -euo pipefail
          for fam in debian fedora arch suse; do
            echo "==== $fam ===="
            ./install.sh --force-family "$fam" --dry-run --all --with-optional --yes
          done
